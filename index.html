<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comunidades | Encuentra y comparte grupos</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:'Inter',sans-serif;background:#0f172a;color:#0f172a}
    a{text-decoration:none}

    .hero{background:linear-gradient(135deg,#6366f1,#22c55e);color:white;padding:40px 20px;text-align:center}
    .hero h1{margin:0;font-size:32px}
    .hero p{opacity:.9;margin-top:10px}

    .container{max-width:1000px;margin:auto;padding:20px}

    .card{background:white;border-radius:16px;padding:20px;box-shadow:0 10px 25px rgba(0,0,0,.08);margin-bottom:20px}

    input, textarea{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:1px solid #e5e7eb;font-size:14px}

    button{margin-top:12px;width:100%;padding:12px;border:none;border-radius:10px;background:#6366f1;color:white;font-weight:600;cursor:pointer;transition:.2s}
    button:hover{background:#4f46e5}

    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:15px}

    .group-card{background:white;border-radius:16px;padding:15px;box-shadow:0 8px 20px rgba(0,0,0,.06);display:flex;flex-direction:column;justify-content:space-between}
    .group-card h3{margin:0;font-size:18px}
    .group-card p{font-size:13px;color:#6b7280}

    .tag{display:inline-block;background:#eef2ff;color:#4338ca;padding:4px 10px;border-radius:999px;font-size:11px;margin-top:8px}

    .actions{display:flex;justify-content:space-between;align-items:center;margin-top:10px}

    .join{background:#22c55e;color:white;padding:6px 10px;border-radius:8px;font-size:13px}

    .empty{text-align:center;color:#6b7280;padding:30px}
  </style>
</head>
<body>

  <div class="hero">
    <h1>🚀 Directorio de Comunidades</h1>
    <p>Publica tu grupo y consigue nuevos miembros gratis</p>
  </div>

  <div class="container">

    <div class="card">
      <h3>Agregar comunidad</h3>
      <input id="name" placeholder="Nombre del grupo">
      <textarea id="description" placeholder="Descripción"></textarea>
      <input id="link" placeholder="Link de WhatsApp / Telegram">
      <input id="category" placeholder="Categoría (ej: gaming, estudio)">
      <button onclick="addCommunity()">Publicar</button>
    </div>

    <div id="list" class="grid"></div>

  </div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCSCAomgmEdPu8pBQsI5POqZjBBQgQ3vhA",
  authDomain: "grupos-whatsapp-6da77.firebaseapp.com",
  projectId: "grupos-whatsapp-6da77",
  storageBucket: "grupos-whatsapp-6da77.firebasestorage.app",
  messagingSenderId: "523898705855",
  appId: "1:523898705855:web:5ba8d33f1e12707904b30a",
  measurementId: "G-K0XGD7MF6B"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function addCommunity(){
  const name = document.getElementById('name').value.trim();
  const description = document.getElementById('description').value.trim();
  let link = document.getElementById('link').value.trim();

// asegurar formato correcto
if(!link.startsWith("https://")){
  link = "https://" + link;
}
  const category = document.getElementById('category').value.trim();

  if(!name || !description || !link){
    alert('Completa todos los campos obligatorios');
    return;
  }

  db.collection("communities").add({
    name, description, link, category,
    createdAt: Date.now()
  });

  document.getElementById('name').value='';
  document.getElementById('description').value='';
  document.getElementById('link').value='';
  document.getElementById('category').value='';
}

function render(snapshot){
  const list = document.getElementById('list');
  list.innerHTML='';

  if(snapshot.empty){
    list.innerHTML = '<div class="empty">Aún no hay comunidades. Sé el primero 🚀</div>';
    return;
  }

  snapshot.forEach(doc => {
    const c = doc.data();

    const div = document.createElement('div');
    div.className='group-card';

    div.innerHTML = `
      <div>
        <h3>${c.name}</h3>
        <p>${c.description}</p>
        <div class="tag">${c.category || 'General'}</div>
      </div>
      <div class="actions">
        <a href="${encodeURI(c.link)}" target="_blank" rel="noopener noreferrer" class="join">Unirse</a>
      </div>
    `;

    list.appendChild(div);
  });
}

// Escuchar cambios en tiempo real
db.collection("communities")
.orderBy("createdAt","desc")
.onSnapshot(render);
</script>

</body>
</html>
