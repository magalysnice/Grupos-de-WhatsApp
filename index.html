<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comunidades | Encuentra y comparte grupos</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:'Inter',sans-serif;background:#0f172a;color:#0f172a}
    a{text-decoration:none}

    .hero{background:linear-gradient(135deg,#6366f1,#22c55e);color:white;padding:40px 20px;text-align:center}
    .hero h1{margin:0;font-size:32px}
    .hero p{opacity:.9;margin-top:10px}

    .container{max-width:1000px;margin:auto;padding:20px}

    .card{background:white;border-radius:16px;padding:20px;box-shadow:0 10px 25px rgba(0,0,0,.08);margin-bottom:20px}

    input, textarea{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:1px solid #e5e7eb;font-size:14px}

    button{margin-top:12px;width:100%;padding:12px;border:none;border-radius:10px;background:#6366f1;color:white;font-weight:600;cursor:pointer}
    button:hover{background:#4f46e5}

    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:15px}

    .group-card{background:white;border-radius:16px;padding:15px;box-shadow:0 8px 20px rgba(0,0,0,.06)}
    .group-card h3{margin:0}
    .group-card p{font-size:13px;color:#6b7280}

    .tag{background:#eef2ff;color:#4338ca;padding:4px 10px;border-radius:999px;font-size:11px;margin-top:8px;display:inline-block}

    .actions{margin-top:10px;display:flex;gap:8px}

    .join{background:#22c55e;color:white;padding:6px 10px;border-radius:8px}
  </style>
</head>
<body>

  <div class="hero">
    <button onclick="login()">Login Admin</button>
    <h1>🚀 Directorio de Comunidades</h1>
    <p>Publica tu grupo y consigue nuevos miembros gratis</p>
  </div>

  <div class="container">
    <div class="card">
      <h3>Agregar comunidad</h3>
      <input id="name" placeholder="Nombre del grupo">
      <textarea id="description" placeholder="Descripción"></textarea>
      <input id="link" placeholder="Link de WhatsApp">
      <input id="category" placeholder="Categoría">
      <button onclick="addCommunity()">Publicar</button>
    </div>

    <div id="list" class="grid"></div>
  </div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCSCAomgmEdPu8pBQsI5POqZjBBQgQ3vhA",
  authDomain: "grupos-whatsapp-6da77.firebaseapp.com",
  projectId: "grupos-whatsapp-6da77",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const ADMIN_EMAIL = "dienyalexandra2017@gmail.com";
let currentUser = null;

// LOGIN
function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithRedirect(provider);
}

// Detectar usuario y cargar datos
firebase.auth().onAuthStateChanged(user => {
  currentUser = user;

  db.collection("communities")
    .orderBy("createdAt","desc")
    .onSnapshot(render);
});

// Detectar resultado login
firebase.auth().getRedirectResult().then(result => {
  if(result.user){
    currentUser = result.user;
    alert("Sesión iniciada como " + currentUser.email);
  }
});

// AGREGAR GRUPO
async function addCommunity(){
  const name = document.getElementById('name').value.trim();
  const description = document.getElementById('description').value.trim();
  let link = document.getElementById('link').value.trim();
  const category = document.getElementById('category').value.trim();

  if(!link.startsWith("https://")){
    link = "https://" + link;
  }

  if(!link.startsWith("https://chat.whatsapp.com/")){
    alert("Solo links de WhatsApp");
    return;
  }

  if(link.length < 30){
    alert("Link inválido");
    return;
  }

  const bannedWords = ["sexo","porn","casino"];
  if((name + description).toLowerCase().includes(bannedWords)){
    alert("Contenido no permitido");
    return;
  }

  const snapshot = await db.collection("communities")
    .where("link","==",link)
    .get();

  if(!snapshot.empty){
    alert("Este grupo ya existe");
    return;
  }

  db.collection("communities").add({
    name, description, link, category,
    createdAt: Date.now()
  });
}

// ELIMINAR
function deleteGroup(id){
  if(confirm("¿Eliminar?")){
    db.collection("communities").doc(id).delete();
  }
}

// RENDER
function render(snapshot){
  const list = document.getElementById('list');
  list.innerHTML = "";

  snapshot.forEach(doc => {
    const c = doc.data();

    const div = document.createElement('div');
    div.className = "group-card";

    div.innerHTML = `
      <h3>${c.name}</h3>
      <p>${c.description}</p>
      <div class="tag">${c.category || 'General'}</div>

      <div class="actions">
        <a href="${c.link}" target="_blank" class="join">Unirse</a>

        ${currentUser && currentUser.email === ADMIN_EMAIL
          ? `<button onclick="deleteGroup('${doc.id}')">Eliminar</button>`
          : ""}
      </div>
    `;

    list.appendChild(div);
  });
}
</script>

</body>
</html>
